<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Connection Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f5f5f5;
        }
        .test-result {
            margin: 10px 0;
            padding: 10px;
            border-radius: 5px;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>
    <h1>🌱 API Connection Test</h1>
    <p>This page tests the connection to the Django backend server.</p>
    
    <button onclick="testAPIStatus()">Test API Status</button>
    <button onclick="testRecommendation()">Test Recommendation</button>
    <button onclick="testHistory()">Test History</button>
    
    <div id="results"></div>
    
    <script>
        const API_BASE = 'http://127.0.0.1:8000/api';
        
        function addResult(message, isSuccess = true) {
            const resultsDiv = document.getElementById('results');
            const resultDiv = document.createElement('div');
            resultDiv.className = `test-result ${isSuccess ? 'success' : 'error'}`;
            resultDiv.innerHTML = message;
            resultsDiv.appendChild(resultDiv);
        }
        
        async function testAPIStatus() {
            try {
                addResult('🔄 Testing API Status...', true);
                const response = await fetch(`${API_BASE}/status/`);
                const data = await response.json();
                
                if (response.ok) {
                    addResult(`✅ API Status: ${JSON.stringify(data)}`, true);
                } else {
                    addResult(`❌ API Status Error: ${response.status} - ${JSON.stringify(data)}`, false);
                }
            } catch (error) {
                addResult(`❌ API Status Error: ${error.message}`, false);
            }
        }
        
        async function testRecommendation() {
            try {
                addResult('🔄 Testing Crop Recommendation...', true);
                const testData = {
                    crop: 'Rice',
                    season: 'Kharif',
                    soil: 'Loamy',
                    preference: 'Organic',
                    location_name: 'Delhi',
                    latitude: 28.6139,
                    longitude: 77.2090,
                    planting_date: '2025-09-25'
                };
                
                const response = await fetch(`${API_BASE}/recommend/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(testData)
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    addResult(`✅ Recommendation Success: ID ${data.id}, Crop: ${data.crop}, Location: ${data.location_name}`, true);
                } else {
                    addResult(`❌ Recommendation Error: ${response.status} - ${JSON.stringify(data)}`, false);
                }
            } catch (error) {
                addResult(`❌ Recommendation Error: ${error.message}`, false);
            }
        }
        
        async function testHistory() {
            try {
                addResult('🔄 Testing Recommendation History...', true);
                const response = await fetch(`${API_BASE}/recommend/history/`);
                const data = await response.json();
                
                if (response.ok) {
                    addResult(`✅ History Success: Found ${data.length} recommendations`, true);
                } else {
                    addResult(`❌ History Error: ${response.status} - ${JSON.stringify(data)}`, false);
                }
            } catch (error) {
                addResult(`❌ History Error: ${error.message}`, false);
            }
        }
        
        // Auto-test on page load
        window.addEventListener('load', () => {
            addResult('🚀 Page loaded. Click buttons above to test API connection.', true);
        });
    </script>
</body>
</html>
