version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: crop_recommendation_db
    restart: always
    environment:
      MYSQL_DATABASE: crop_recommendation
      MYSQL_USER: crop_user
      MYSQL_PASSWORD: crop_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - crop_network

  web:
    build: .
    container_name: crop_recommendation_web
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    environment:
      - DEBUG=False
      - DB_HOST=db
      - DB_NAME=crop_recommendation
      - DB_USER=crop_user
      - DB_PASSWORD=crop_password
    depends_on:
      - db
    networks:
      - crop_network
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn crop_recommendation.wsgi:application --bind 0.0.0.0:8000"

  nginx:
    image: nginx:alpine
    container_name: crop_recommendation_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - web
    networks:
      - crop_network

volumes:
  mysql_data:
  static_volume:
  media_volume:

networks:
  crop_network:
    driver: bridge
